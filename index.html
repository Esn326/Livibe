<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVIBE - 演唱會評價平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-box">LIVIBE</a>
    </nav>

    <header>
        <h1>LIVIBE</h1>
        <p>發現台灣最精彩的現場演出</p>
    </header>

    <div class="control-panel">
        <div class="sort-group">
            <button class="sort-btn active" data-sort="date">📅 演出時間</button>
            <button class="sort-btn" data-sort="artist">🎤 藝人名稱</button>
            <button class="sort-btn" data-sort="location">📍 場地地區</button>
        </div>
    </div>

    <div id="concert-grid" class="concert-grid">
        <p style="text-align: center; grid-column: 1/-1;">資料載入中...</p>
    </div>

    <script src="main.js"></script> 
</body>
</html>
