<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>LIVIBE - 現場演出脈動</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo-box">LIVIBE</a>
    </nav>
<div class="control-panel" style="max-width:1200px; margin:20px auto; display:flex; gap:10px; padding:0 20px;">
    <input type="text" id="search-input" placeholder="搜尋藝人或活動..." style="flex:2; padding:12px; background:#111; border:1px solid #333; color:#fff; border-radius:4px;">
    <select id="filter-tag" style="flex:1; padding:12px; background:#111; border:1px solid #333; color:#fff;">
        <option value="all">所有標籤</option>
        <option value="TOUR">TOUR</option>
        <option value="JOINT">JOINT</option>
        <option value="FESTIVAL">FESTIVAL</option>
        <option value="SHOWCASE">SHOWCASE</option>
        <option value="VARIETY">VARIETY</option>
    </select>
    <select id="sort-order" style="flex:1; padding:12px; background:#111; border:1px solid #333; color:#fff;">
        <option value="newest">最新</option>
        <option value="oldest">最舊</option>
    </select>
</div>
    <div class="control-panel">
        <div class="sort-group">
            <select id="filter-tag" class="sort-btn" style="appearance: none; text-align: center;">
                <option value="ALL">全部類型</option>
                <option value="tour">巡迴演唱會</option>
                <option value="festival">音樂祭 / 跨年</option>
                <option value="showcase">專場演出</option>
                <option value="variety">職棒 / 體育</option>
            </select>
            
            <input type="date" id="filter-date" class="sort-btn" style="color-scheme: dark;">

            <button class="sort-btn active" data-sort="date-desc">最新日期</button>
            <button class="sort-btn" data-sort="date-asc">最舊日期</button>
            <button class="sort-btn" data-sort="title">名稱排序</button>
        </div>
    </div>

    <div id="concert-grid" class="concert-grid">
        </div>

    <script src="main.js"></script>
</body>
</html>
