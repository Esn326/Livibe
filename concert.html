<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVIBE | 演出詳情</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container { max-width: 1100px; margin: 60px auto; padding: 0 40px; display: flex; gap: 60px; flex-wrap: wrap; }
        .detail-poster-column { flex: 1; min-width: 300px; }
        .detail-poster-column img { width: 100%; border-radius: 4px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .detail-info-column { flex: 1.5; min-width: 350px; }
        #detail-title { font-size: 3.5rem; margin: 0 0 10px 0; line-height: 1.2; font-weight: 900; }
        #detail-artist { color: var(--imdb-yellow); font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 1px; }
        .info-text { font-size: 1.1rem; line-height: 1.8; color: #eee; }
        .ui-tag { display: inline-block; padding: 4px 12px; font-weight: 900; border-radius: 4px; font-size: 0.9rem; margin-bottom: 20px; text-transform: uppercase; }
        @media (max-width: 768px) {
            .detail-container { flex-direction: column; margin: 20px auto; padding: 0 20px; }
            #detail-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-box">LIVIBE</a>
    </nav>

    <div class="detail-container">
        <div class="detail-poster-column">
            <img id="detail-poster" src="" alt="演出海報">
        </div>

        <div class="detail-info-column">
            <h1 id="detail-title">載入中...</h1>
            <h2 id="detail-artist"></h2>
            
            <div id="detail-info" class="info-text">
                <div style="margin-bottom:20px;"><span id="tag-display" class="ui-tag"></span></div>
                
                <div id="session-container" class="session-box" style="background: #1A1A1A; padding: 15px; border-radius: 4px; border: 1px solid #333; margin-bottom: 20px; display: none;">
                    <label style="color: #A3A3A3; font-size: 0.8rem; display: block; margin-bottom: 5px;">選擇場次：</label>
                    <select id="session-dropdown" style="width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px;"></select>
                </div>

                <p><strong>場地：</strong><span id="display-venue"></span> <a id="display-map" href="#" target="_blank" style="color: #F5C518; text-decoration: none; margin-left: 10px;">📍 開啟地圖</a></p>
                <p><strong>日期：</strong><span id="display-date"></span></p>
            </div>
            
            <div style="margin-top:20px; padding-top:20px; border-top:1px solid #333; color:#A3A3A3;" id="artist-list">
                </div>
        </div>
    </div>
    <script src="detail.js"></script>
</body>
</html>
